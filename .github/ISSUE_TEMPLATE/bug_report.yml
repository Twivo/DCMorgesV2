name: Bug
description: Signaler un problème sur le site ou l'admin
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Explique ce qui ne fonctionne pas.
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page ou URL
      placeholder: /club/ ou /admin/content
  - type: textarea
    id: reproduce
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Aller sur...
        2. Cliquer sur...
        3. Observer...
  - type: textarea
    id: expected
    attributes:
      label: Résultat attendu
  - type: textarea
    id: screenshots
    attributes:
      label: Captures ou détails utiles
